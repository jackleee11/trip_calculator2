<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能行程报价计算器 (修复版)</title>
    
    <script type="text/javascript">
        window._AMapSecurityConfig = {
            securityJsCode: 'db07cb129d8c49be7e308356802fec5b'
        };
    </script>
    
    <!-- 引入高德地图 JS API -->
    <script src="https://webapi.amap.com/maps?v=2.0&key=1242e8a6f35f92ba5a118d2b2264ea46&plugin=AMap.Driving,AMap.Scale,AMap.ToolBar,AMap.PlaceSearch"></script>
    
    <style>
        /* 样式保持不变，省略以节省空间，直接使用上一版的样式即可 */
        :root { --primary: #2563eb; --bg: #f3f4f6; --card: #ffffff; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 420px; background: var(--card); padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.1); overflow-y: auto; display: flex; flex-direction: column; gap: 15px; z-index: 10; }
        h2 { margin: 0 0 10px 0; color: #1f2937; font-size: 1.2rem; border-bottom: 2px solid #e5e7eb; padding-bottom: 10px; }
        h3 { margin: 15px 0 8px 0; color: #4b5563; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.85rem; color: #6b7280; font-weight: 500; }
        textarea#smartInput { width: 100%; height: 80px; padding: 10px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 0.95rem; resize: vertical; font-family: inherit; box-sizing: border-box; }
        textarea#smartInput:focus { outline: none; border-color: var(--primary); }
        .btn-parse { background: #8b5cf6; color: white; border: none; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: 500; }
        .btn-parse:hover { background: #7c3aed; }
        input { padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 0.9rem; }
        input:focus { outline: none; border-color: var(--primary); }
        .waypoint-list { display: flex; flex-direction: column; gap: 8px; max-height: 150px; overflow-y: auto; border: 1px solid #e5e7eb; padding: 10px; border-radius: 6px; background: #f9fafb; }
        .waypoint-item { display: flex; gap: 5px; animation: fadeIn 0.3s ease; }
        .waypoint-item input { flex: 1; }
        .btn-remove { background: #ef4444; color: white; border: none; border-radius: 4px; cursor: pointer; padding: 0 10px; font-weight: bold; }
        .btn-add { background: #10b981; color: white; border: none; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; margin-top: 5px; }
        .btn-calc { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; margin-top: 15px; box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2); }
        .btn-calc:hover { background: #1d4ed8; }
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; }
        #container { width: 100%; height: 60%; background: #e5e7eb; }
        .result-panel { height: 40%; background: var(--card); padding: 20px; border-top: 1px solid #e5e7eb; display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .stat-card { background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; justify-content: center; }
        .stat-label { font-size: 0.8rem; color: #64748b; margin-bottom: 8px; font-weight: 600; }
        .stat-value { font-size: 1.4rem; font-weight: 800; color: #0f172a; }
        .stat-unit { font-size: 0.8rem; color: #64748b; font-weight: normal; margin-left: 2px; }
        .total-price { color: #dc2626; font-size: 1.6rem; }
        #errorMsg { color: #ef4444; font-size: 0.85rem; margin-top: 10px; min-height: 1.2em; font-weight: 500; white-space: pre-wrap; }
        .loading { color: #2563eb; }
        .success { color: #059669; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { body { flex-direction: column; overflow: auto; height: auto; } .sidebar { width: 100%; height: auto; box-sizing: border-box; } #container { height: 400px; } .result-panel { grid-template-columns: 1fr 1fr; height: auto; } }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>🧠 AI 智能行程报价 (修复版)</h2>
        
        <h3>1. 智能行程识别</h3>
        <div class="input-group">
            <label>输入行程描述</label>
            <textarea id="smartInput" placeholder="示例：从北京到上海，途经济南"></textarea>
            <button class="btn-parse" onclick="parseSmartText()">✨ 自动识别地点</button>
        </div>

        <div style="border-top: 1px dashed #e5e7eb; margin: 10px 0;"></div>

        <h3>2. 行程明细</h3>
        <div class="input-group">
            <label>起点</label>
            <input type="text" id="startPoint" placeholder="自动识别后显示">
        </div>
        <div class="input-group">
            <label>终点</label>
            <input type="text" id="endPoint" placeholder="自动识别后显示">
        </div>
        
        <label style="margin-top:10px; font-size:0.85rem; color:#6b7280;">途经点</label>
        <div class="waypoint-list" id="waypointList"></div>
        <button class="btn-add" onclick="addWaypoint()">+ 手动添加途经点</button>

        <h3>3. 成本参数</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <div class="input-group"><label>百公里油耗 (L)</label><input type="number" id="fuelConsumption" value="12" step="0.1"></div>
            <div class="input-group"><label>油价 (元/L)</label><input type="number" id="fuelPrice" value="7.5" step="0.1"></div>
            <div class="input-group"><label>司机工资 (元/天)</label><input type="number" id="driverSalary" value="400"></div>
            <div class="input-group"><label>每公里利润 (元)</label><input type="number" id="profitPerKm" value="2.5" step="0.1"></div>
            <div class="input-group"><label>预计天数</label><input type="number" id="days" value="2"></div>
            <div class="input-group"><label>其他固定成本 (元)</label><input type="number" id="fixedCost" value="0"></div>
        </div>

        <button class="btn-calc" onclick="calculateRoute()">🗺️ 生成轨迹并计算报价</button>
        <div id="errorMsg"></div>
        <div style="font-size: 0.75rem; color: #9ca3af; margin-top: 5px;">💡 如果一直加载，请按 F12 查看 Console 错误信息</div>
    </div>

    <div class="main-content">
        <div id="container"></div>
        <div class="result-panel">
            <div class="stat-card"><div class="stat-label">📏 总里程</div><div class="stat-value" id="resDistance">0<span class="stat-unit">km</span></div></div>
            <div class="stat-card"><div class="stat-label">⛽ 燃油成本</div><div class="stat-value" id="resFuelCost">0<span class="stat-unit">元</span></div></div>
            <div class="stat-card"><div class="stat-label">👷 人工及杂费</div><div class="stat-value" id="resLaborCost">0<span class="stat-unit">元</span></div></div>
            <div class="stat-card"><div class="stat-label">💰 预估总报价</div><div class="stat-value total-price" id="resTotalPrice">0<span class="stat-unit">元</span></div></div>
        </div>
    </div>

    <script>
        let map;
        let driving;
        let placeSearch;
        let routeLine;
        let planningTimer = null; // 用于超时检测

        function initMap() {
            try {
                map = new AMap.Map('container', {
                    zoom: 11,
                    center: [116.397428, 39.90923],
                    viewMode: '3D'
                });
                
                map.addControl(new AMap.Scale());
                map.addControl(new AMap.ToolBar());

                driving = new AMap.Driving({
                    map: map,
                    panel: null, 
                    policy: AMap.DrivingPolicy.LEAST_TIME
                });

                placeSearch = new AMap.PlaceSearch({ pageSize: 1, extensions: 'all' });

                // 监听成功
                AMap.event.addListener(driving, 'complete', function(data){
                    clearTimeout(planningTimer); // 清除超时计时器
                    if(data.routes && data.routes.length > 0) {
                        renderResult(data);
                        document.getElementById('errorMsg').innerHTML = "<span class='success'>✅ 路线规划成功</span>";
                    } else {
                        document.getElementById('errorMsg').innerText = "⚠️ 未找到合适的路线，请检查地点名称是否准确。\n返回数据: " + JSON.stringify(data);
                    }
                });
                
                // 监听错误
                AMap.event.addListener(driving, 'error', function(e){
                    clearTimeout(planningTimer);
                    console.error("高德规划错误:", e);
                    document.getElementById('errorMsg').innerText = "❌ 规划失败: " + (e.message || "未知错误") + "\n请检查 Key 权限或网络连接。";
                });

            } catch (e) {
                console.error("地图初始化失败:", e);
                document.getElementById('errorMsg').innerText = "❌ 地图加载失败: " + e.message;
            }
        }

        function parseSmartText() {
            const text = document.getElementById('smartInput').value.trim();
            const errorDiv = document.getElementById('errorMsg');
            if (!text) { errorDiv.innerText = "⚠️ 请输入行程描述文字"; return; }
            errorDiv.innerHTML = "<span class='loading'>⏳ 正在智能分析...</span>";

            let processedText = text.replace(/(从|自|由|出发地|起点)[:：]?/g, "##START##")
                                    .replace(/(到|至|去|目的地|终点|到达)[:：]?/g, "##END##")
                                    .replace(/(途经|经过|路过|停靠|中间去)[:：]?/g, "##WAY##");

            let start = "", end = "", waypoints = [];
            const markers = processedText.match(/##START##|##END##|##WAY##/g) || [];

            if (markers.length === 0) {
                const simpleParts = text.split(/[,,，,;\s]+/).filter(p => p.trim() !== "");
                if (simpleParts.length >= 2) {
                    start = simpleParts[0].trim();
                    end = simpleParts[simpleParts.length - 1].trim();
                    if (simpleParts.length > 2) waypoints = simpleParts.slice(1, simpleParts.length - 1).map(s => s.trim());
                }
            } else {
                const startMatch = processedText.match(/##START##([^#]+)/);
                if (startMatch) start = startMatch[1].split(/##/)[0].trim();
                const endMatch = processedText.match(/##END##([^#]+)/);
                if (endMatch) end = endMatch[1].split(/##/)[0].trim();
                const wayMatches = processedText.matchAll(/##WAY##([^#]+)/g);
                for (const match of wayMatches) {
                    const content = match[1].split(/##/)[0].trim();
                    if(content) waypoints.push(content);
                }
                if (!start && processedText.indexOf('##') !== 0) {
                     const firstPart = processedText.split('##')[0].trim();
                     if(firstPart) start = firstPart;
                }
            }
            
            if (start) document.getElementById('startPoint').value = start;
            if (end) document.getElementById('endPoint').value = end;
            
            const list = document.getElementById('waypointList');
            list.innerHTML = '';
            waypoints.forEach(wp => {
                const div = document.createElement('div');
                div.className = 'waypoint-item';
                div.innerHTML = `<input type="text" class="waypoint-input" value="${wp}"><button class="btn-remove" onclick="this.parentElement.remove()">×</button>`;
                list.appendChild(div);
            });

            if (start && end) {
                errorDiv.innerHTML = `<span class='success'>✅ 识别成功：${start} → ${end}</span>`;
            } else {
                errorDiv.innerText = "⚠️ 未能完整识别，请手动调整。";
            }
        }

        function addWaypoint() {
            const list = document.getElementById('waypointList');
            const div = document.createElement('div');
            div.className = 'waypoint-item';
            div.innerHTML = `<input type="text" class="waypoint-input" placeholder="输入途经点"><button class="btn-remove" onclick="this.parentElement.remove()">×</button>`;
            list.appendChild(div);
        }

        function calculateRoute() {
            const start = document.getElementById('startPoint').value.trim();
            const end = document.getElementById('endPoint').value.trim();
            
            if(!start || !end) { alert("⚠️ 请确保起点和终点已填写"); return; }

            const waypoints = [];
            document.querySelectorAll('.waypoint-input').forEach(input => {
                if(input.value.trim()) waypoints.push(input.value.trim());
            });

            const errorDiv = document.getElementById('errorMsg');
            errorDiv.innerHTML = "<span class='loading'>⏳ 正在规划最优路线并计算...</span>";

            if(routeLine) { map.remove(routeLine); }
            clearTimeout(planningTimer);

            // 启动超时检测 (15秒)
            planningTimer = setTimeout(() => {
                errorDiv.innerText = "❌ 请求超时！\n可能原因：\n1. 高德 Key 白名单未设置为 '*' \n2. 网络连接不稳定\n3. 地点名称无法解析\n\n请按 F12 查看控制台详细报错。";
            }, 15000);

            try {
                driving.search(start, end, {
                    waypoints: waypoints.length > 0 ? waypoints : null
                });
            } catch (e) {
                clearTimeout(planningTimer);
                errorDiv.innerText = "❌ 调用失败: " + e.message;
            }
        }

        function renderResult(data) {
            const route = data.routes[0];
            const distanceKm = route.distance / 1000; 
            
            const fuelConsPer100km = parseFloat(document.getElementById('fuelConsumption').value) || 0;
            const fuelPrice = parseFloat(document.getElementById('fuelPrice').value) || 0;
            const salary = parseFloat(document.getElementById('driverSalary').value) || 0;
            const profitPerKm = parseFloat(document.getElementById('profitPerKm').value) || 0;
            const days = parseFloat(document.getElementById('days').value) || 1;
            const fixedCost = parseFloat(document.getElementById('fixedCost').value) || 0;

            const totalFuelCost = (distanceKm / 100) * fuelConsPer100km * fuelPrice;
            const totalLaborCost = (salary * days) + fixedCost;
            const totalProfit = distanceKm * profitPerKm;
            const totalPrice = totalFuelCost + totalLaborCost + totalProfit;

            animateValue("resDistance", distanceKm.toFixed(1), " km");
            animateValue("resFuelCost", totalFuelCost.toFixed(2), " 元");
            animateValue("resLaborCost", totalLaborCost.toFixed(2), " 元");
            animateValue("resTotalPrice", totalPrice.toFixed(2), " 元", true);
            
            map.setFitView();
        }

        function animateValue(id, value, unit, isHighlight = false) {
            const obj = document.getElementById(id);
            obj.innerHTML = `${value}<span class="stat-unit">${unit}</span>`;
            if(isHighlight) {
                obj.parentElement.style.borderColor = "#dc2626";
                setTimeout(() => obj.parentElement.style.borderColor = "#e2e8f0", 500);
            }
        }

        window.onload = initMap;
    </script>
</body>
</html>
